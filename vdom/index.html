<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Command Centre</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #1f1f22;
            --surface: #26262b;
            --surface-2: #2d2d33;
            --surface-3: #3a3a44;
            --surface-4: #444452;
            --text: #e7e7ea;
            --muted: #a9a9b2;
            --border: #3a3a44;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            --accent: #7dd3fc;
            --accent-2: #a78bfa;
            --danger: #fb7185;
            --selection: rgba(125, 211, 252, 0.18);
            --focus: 0 0 0 3px rgba(125, 211, 252, 0.35);
            --radius: 10px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 12px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            letter-spacing: 0.15px;
        }

        ::selection { background: rgba(167, 139, 250, 0.28); }

        #app {
            min-height: 100%;
            padding: 12px;
        }

        /* Elm renders into #app; style by element defaults. */
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        button, input, select, textarea {
            font: inherit;
            color: inherit;
        }

        button {
            background: var(--surface-4);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
            cursor: pointer;
        }
        button:hover { background: #4b4b5b; border-color: rgba(125, 211, 252, 0.55); }
        button:active { transform: translateY(1px); }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }
        button:disabled:hover,
        button:disabled:active {
            background: var(--surface-4);
            border-color: var(--border);
            transform: none;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            outline: none;
        }
        select { padding-right: 22px; }
        input:focus, select:focus, textarea:focus { box-shadow: var(--focus); border-color: rgba(125, 211, 252, 0.65); }

        /* Tables */
        table { color: var(--text); }

        /* Scrollbars (WebKit) */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; border: 2px solid rgba(0,0,0,0); background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); border: 2px solid rgba(0,0,0,0); background-clip: padding-box; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.12); }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script src="init.js"></script>
</body>
</html>
